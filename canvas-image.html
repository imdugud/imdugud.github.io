<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
<div>
    Image Upload:
    <input type="file" id="imageUpload" accept="image/*" >
    <button onclick="resetImage()">Reset Image</button>
    <button onclick="setGrayscale()">Grayscale</button>
    <button onclick="setThreshold(127.5)">Threshold</button>
    <button onclick="setBrightness(30)">Brightness</button>
    <button onclick="setDotDistortion(30)">Distortion</button>
    <button onclick="setImageLineEffect(90)">BlackLineEffect</button>
    <button onclick="setColorShifting(5)">Color Shifting</button>
    <button onclick="setAverage()">Average</button>
    <button onclick="reduceColor()">Reduce Color</button>
</div>
<canvas id="theCanvas" width="700"></canvas>


<script src="canvas-image.js"></script>
</body>
</html>
